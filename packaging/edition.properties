# SEPA Generator — Community edition packaging identity
#
# Single source of stable, edition-specific packaging values shared by the
# Windows/macOS/Linux packaging scripts. The application VERSION is NOT defined
# here: it is derived from the authoritative Maven module version at build time
# (generator module) so package metadata, filenames and the in-app version
# cannot drift.
#
# Do NOT put secrets, signing credentials, machine-specific paths, or generated
# values in this file.
#
# The Pro edition ships its own packaging/edition.properties with the same keys
# so the platform scripts stay byte-identical across editions.

# Installed / displayed application name.
APP_NAME=SEPA Generator Community

# Artifact slug used to build canonical output filenames
# (e.g. SEPA-Generator-Community-<version>-windows-x64.msi).
ARTIFACT_SLUG=SEPA-Generator-Community

# User-facing vendor / byline.
VENDOR=Niryosys

# Short human description used in installer metadata.
DESCRIPTION=Generate SEPA payment XML files from spreadsheet inputs.

# Fully-qualified main class of the runnable (shaded) generator JAR.
MAIN_CLASS=com.pcariou.generator.Generator

# --- Permanent, released technical identities (DO NOT change between releases) ---
# Changing any of these breaks in-place upgrades / coexistence for installed users.

# Windows MSI stable upgrade UUID (in-place upgrade of the Community install).
WIN_UPGRADE_UUID=b1f8e2a4-3c7d-4e15-9a2b-7c6d5e4f3a21

# macOS bundle identifier (reverse-DNS) and short menu-bar name (<= 16 chars).
MAC_PACKAGE_IDENTIFIER=com.pcariou.sepa.community
MAC_MENU_NAME=SEPA Generator

# Linux Debian package name.
LINUX_PACKAGE_NAME=sepa-generator-community

# --- Linux presentation metadata ---
# Freedesktop menu categories for the generated .desktop entry.
LINUX_MENU_GROUP=Office;Finance
# Debian "Section" field.
LINUX_APP_CATEGORY=utils
# Debian maintainer (matches AppLinks.CONTACT).
DEB_MAINTAINER=contact@sepa-xml-generator.com
